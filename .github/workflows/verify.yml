name: Verify CoboRouter

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  local-demo-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify local demo submission pack
        run: npm run ci:local
