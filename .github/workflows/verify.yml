name: Verify CoboRouter

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  local-demo-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COBO_PROOF_TYPE: on_chain
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        env:
          NPM_CONFIG_FETCH_RETRIES: 5
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            sleep $((attempt * 10))
          done
          npm ci

      - name: TypeScript check
        run: npm run check

      - name: Secret scan
        run: npm run secret:scan

      - name: Smoke receipts
        run: npm run smoke

      - name: Agent E2E
        run: npm run e2e:agent

      - name: Verify approved receipt
        run: npm run verify:receipt -- receipts/coborouter_demo_approved_001.json

      - name: Verify blocked receipt
        run: npm run verify:receipt -- receipts/coborouter_demo_blocked_001.json
