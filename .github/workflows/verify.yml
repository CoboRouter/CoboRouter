name: Verify CoboRouter

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  local-demo-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        env:
          NPM_CONFIG_FETCH_RETRIES: 5
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            sleep $((attempt * 10))
          done
          npm ci

      - name: TypeScript check
        run: npm run check

      - name: Secret scan
        run: npm run secret:scan

      - name: Smoke receipts
        run: npm run smoke

      - name: Agent E2E
        run: npm run e2e:agent

      - name: Evidence pack
        run: |
          npm run evidence
          npm run packet:application
          npm run audit:submission
          npm run env:final-template
          npm run blockers:final
          npm run artifact:index
          npm run bundle:submission
          npm run bundle:archive

      - name: Verify submission pack
        run: npm run verify:submission
